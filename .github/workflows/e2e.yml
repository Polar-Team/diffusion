name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e-linux:
    name: E2E Tests (${{ matrix.box }})
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        box:
          - ubuntu2204
          - ubuntu2404

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # GitHub Actions "Vagrant hack": enable KVM access on the Ubuntu runner
      # so that libvirt/QEMU can create hardware-accelerated VMs.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Vagrant and libvirt
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            vagrant \
            libvirt-daemon-system \
            libvirt-dev \
            qemu-kvm \
            ruby-dev \
            build-essential
          sudo systemctl start libvirtd
          sudo usermod -aG kvm,libvirt $USER

      - name: Install vagrant-libvirt plugin
        run: vagrant plugin install vagrant-libvirt

      - name: Run E2E tests
        working-directory: tests/e2e
        env:
          BOX_NAME: ${{ matrix.box }}
          VAGRANT_DEFAULT_PROVIDER: libvirt
        run: vagrant up --provider=libvirt

      - name: Destroy VM
        if: always()
        working-directory: tests/e2e
        env:
          BOX_NAME: ${{ matrix.box }}
        run: vagrant destroy -f

  e2e-windows:
    name: E2E Tests (windows-latest)
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Build diffusion
        run: make build

      - name: Run unit tests
        run: go test -v ./...

      - name: Run E2E smoke tests
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $diffusion = ".\bin\diffusion.exe"

          Write-Host "=========================================="
          Write-Host "Running E2E smoke tests on Windows..."
          Write-Host "=========================================="

          # Test 1: cache enable
          Write-Host "Test 1: Cache enable..."
          & $diffusion cache enable
          if ($LASTEXITCODE -ne 0) { Write-Error "cache enable failed"; exit 1 }

          # Test 2: cache status
          Write-Host "Test 2: Cache status..."
          & $diffusion cache status
          if ($LASTEXITCODE -ne 0) { Write-Error "cache status failed"; exit 1 }

          # Test 3: artifact list
          Write-Host "Test 3: Artifact list..."
          & $diffusion artifact list
          if ($LASTEXITCODE -ne 0) { Write-Error "artifact list failed"; exit 1 }

          Write-Host "=========================================="
          Write-Host "All E2E smoke tests passed on Windows!"
          Write-Host "=========================================="

  e2e-macos:
    name: E2E Tests (macos-latest)
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Build diffusion
        run: make build

      - name: Run unit tests
        run: go test -v ./...

      - name: Run E2E smoke tests
        run: |
          set -e
          DIFFUSION="./bin/diffusion"

          echo "=========================================="
          echo "Running E2E smoke tests on macOS..."
          echo "=========================================="

          # Test 1: cache enable
          echo "Test 1: Cache enable..."
          $DIFFUSION cache enable

          # Test 2: cache status
          echo "Test 2: Cache status..."
          $DIFFUSION cache status

          # Test 3: artifact list
          echo "Test 3: Artifact list..."
          $DIFFUSION artifact list

          echo "=========================================="
          echo "All E2E smoke tests passed on macOS!"
          echo "=========================================="
