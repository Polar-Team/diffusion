name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  DIFFUSION_TESTS_REPO: https://github.com/Polar-Team/diffusion-ansible-tests-role.git

jobs:
  e2e:
    name: E2E Tests (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux distros – run on ubuntu-latest; smoke tests execute inside
          # a Docker container of the target distro via docker run
          - os: ubuntu2304
            runner: ubuntu-latest
            container: ubuntu:23.04
          - os: ubuntu2404
            runner: ubuntu-latest
            container: ubuntu:24.04
          - os: debian12
            runner: ubuntu-latest
            container: debian:12
          - os: debian13
            runner: ubuntu-latest
            container: debian:trixie
          - os: fedora43
            runner: ubuntu-latest
            container: fedora:43
          - os: fedora42
            runner: ubuntu-latest
            container: fedora:42
          - os: almalinux9
            runner: ubuntu-latest
            container: almalinux:9
          - os: almalinux10
            runner: ubuntu-latest
            container: almalinux:10
          - os: archlinux
            runner: ubuntu-latest
            container: archlinux:latest
          # Native runners
          - os: windows
            runner: windows-latest
          - os: macos
            runner: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Build diffusion
        run: make build

      - name: Run unit tests
        run: go test -v ./...

      # ── Docker setup ─────────────────────────────────────────────────────

      - name: Start Docker (Linux)
        if: matrix.runner == 'ubuntu-latest'
        run: |
          sudo systemctl start docker
          docker version
          docker info

      - name: Start Docker (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $svc = Get-Service -Name docker -ErrorAction SilentlyContinue
          if ($svc -and $svc.Status -ne 'Running') {
            Start-Service docker
            Start-Sleep -Seconds 10
          }
          docker version
          docker info

      - name: Install and start Docker (macOS via colima)
        if: matrix.os == 'macos'
        run: |
          brew install colima docker
          colima start --memory 4 --disk 60
          docker version
          docker info

      # ── Smoke tests ───────────────────────────────────────────────────────

      - name: Clone diffusion_tests repo
        run: git clone ${{ env.DIFFUSION_TESTS_REPO }} diffusion_tests

      - name: Run smoke tests (Linux)
        if: matrix.runner == 'ubuntu-latest'
        # Run the diffusion binary (static Go binary) inside the target distro's
        # container. The workspace is mounted at the same host path so that any
        # Docker volume mounts created by molecule resolve correctly on the host
        # Docker daemon (which owns the mounted socket).
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:$GITHUB_WORKSPACE" \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -w "$GITHUB_WORKSPACE/diffusion_tests" \
            -e WORKSPACE="$GITHUB_WORKSPACE" \
            "${{ matrix.container }}" \
            sh -c '
              set -e
              DIFFUSION="$WORKSPACE/bin/diffusion"

              echo "=========================================="
              echo "Running deps smoke tests on ${{ matrix.os }}..."
              echo "=========================================="
              $DIFFUSION deps check || true
              $DIFFUSION deps lock
              $DIFFUSION deps sync
              $DIFFUSION deps check

              echo "=========================================="
              echo "Running molecule smoke tests on ${{ matrix.os }}..."
              echo "=========================================="
              $DIFFUSION molecule --ci
              $DIFFUSION molecule --verify --ci
              $DIFFUSION molecule --idempotence --ci
              $DIFFUSION molecule --lint --ci
              $DIFFUSION molecule --verify --tag ports --ci

              echo "=========================================="
              echo "Running cache/artifact smoke tests on ${{ matrix.os }}..."
              echo "=========================================="
              cd "$WORKSPACE"
              $DIFFUSION cache enable
              $DIFFUSION cache status
              $DIFFUSION artifact list

              echo "=========================================="
              echo "All smoke tests passed on ${{ matrix.os }}!"
              echo "=========================================="
            '

      - name: Run smoke tests (macOS)
        if: matrix.os == 'macos'
        working-directory: diffusion_tests
        run: |
          set -e
          DIFFUSION="$GITHUB_WORKSPACE/bin/diffusion"

          echo "=========================================="
          echo "Running deps smoke tests on macOS..."
          echo "=========================================="
          $DIFFUSION deps check || true
          $DIFFUSION deps lock
          $DIFFUSION deps sync
          $DIFFUSION deps check

          echo "=========================================="
          echo "Running molecule smoke tests on macOS..."
          echo "=========================================="
          $DIFFUSION molecule --ci
          $DIFFUSION molecule --verify --ci
          $DIFFUSION molecule --idempotence --ci
          $DIFFUSION molecule --lint --ci
          $DIFFUSION molecule --verify --tag ports --ci

          echo "=========================================="
          echo "Running cache/artifact smoke tests on macOS..."
          echo "=========================================="
          cd "$GITHUB_WORKSPACE"
          $DIFFUSION cache enable
          $DIFFUSION cache status
          $DIFFUSION artifact list

          echo "=========================================="
          echo "All smoke tests passed on macOS!"
          echo "=========================================="

      - name: Run smoke tests (Windows)
        if: matrix.os == 'windows'
        working-directory: diffusion_tests
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $diffusion = "$env:GITHUB_WORKSPACE\bin\diffusion.exe"

          Write-Host "=========================================="
          Write-Host "Running deps smoke tests on Windows..."
          Write-Host "=========================================="
          & $diffusion deps check
          Write-Host "Initial check exit code: $LASTEXITCODE (non-zero is OK here)"
          & $diffusion deps lock
          if ($LASTEXITCODE -ne 0) { Write-Error "deps lock failed"; exit 1 }
          & $diffusion deps sync
          if ($LASTEXITCODE -ne 0) { Write-Error "deps sync failed"; exit 1 }
          & $diffusion deps check
          if ($LASTEXITCODE -ne 0) { Write-Error "deps check failed after lock+sync"; exit 1 }

          Write-Host "=========================================="
          Write-Host "Running molecule smoke tests on Windows..."
          Write-Host "=========================================="
          & $diffusion molecule --ci
          if ($LASTEXITCODE -ne 0) { Write-Error "molecule failed"; exit 1 }
          & $diffusion molecule --verify --ci
          if ($LASTEXITCODE -ne 0) { Write-Error "molecule --verify failed"; exit 1 }
          & $diffusion molecule --idempotence --ci
          if ($LASTEXITCODE -ne 0) { Write-Error "molecule --idempotence failed"; exit 1 }
          & $diffusion molecule --lint --ci
          if ($LASTEXITCODE -ne 0) { Write-Error "molecule --lint failed"; exit 1 }
          & $diffusion molecule --verify --tag ports --ci
          if ($LASTEXITCODE -ne 0) { Write-Error "molecule --verify --tag ports failed"; exit 1 }

          Write-Host "=========================================="
          Write-Host "Running cache/artifact smoke tests on Windows..."
          Write-Host "=========================================="
          $diffusion = "$env:GITHUB_WORKSPACE\bin\diffusion.exe"
          Set-Location "$env:GITHUB_WORKSPACE"
          & $diffusion cache enable
          if ($LASTEXITCODE -ne 0) { Write-Error "cache enable failed"; exit 1 }
          & $diffusion cache status
          if ($LASTEXITCODE -ne 0) { Write-Error "cache status failed"; exit 1 }
          & $diffusion artifact list
          if ($LASTEXITCODE -ne 0) { Write-Error "artifact list failed"; exit 1 }

          Write-Host "=========================================="
          Write-Host "All smoke tests passed on Windows!"
          Write-Host "=========================================="

