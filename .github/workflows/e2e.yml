name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  DIFFUSION_TESTS_REPO: https://github.com/Polar-Team/diffusion-ansible-tests-role.git

jobs:
  e2e:
    name: E2E Tests (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu2204
            runner: ubuntu-latest
          - os: ubuntu2404
            runner: ubuntu-latest
          - os: windows
            runner: windows-latest
          - os: macos
            runner: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Build diffusion
        run: make build

      - name: Run unit tests
        run: go test -v ./...

      # ── Docker setup ─────────────────────────────────────────────────────

      - name: Start Docker (Linux)
        if: matrix.os == 'ubuntu2204' || matrix.os == 'ubuntu2404'
        run: |
          sudo systemctl start docker
          docker version
          docker info

      - name: Start Docker (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $svc = Get-Service -Name docker -ErrorAction SilentlyContinue
          if ($svc -and $svc.Status -ne 'Running') {
            Start-Service docker
            Start-Sleep -Seconds 10
          }
          docker version
          docker info

      - name: Install and start Docker (macOS via colima)
        if: matrix.os == 'macos'
        run: |
          brew install colima docker
          colima start --memory 4 --disk 60
          docker version
          docker info

      # ── Smoke tests ───────────────────────────────────────────────────────

      - name: Clone diffusion_tests repo
        run: git clone ${{ env.DIFFUSION_TESTS_REPO }} diffusion_tests

      - name: Run deps smoke tests (Windows)
        if: matrix.os == 'windows'
        working-directory: diffusion_tests
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $diffusion = "$env:GITHUB_WORKSPACE\bin\diffusion.exe"

          Write-Host "=========================================="
          Write-Host "Running deps smoke tests on Windows..."
          Write-Host "=========================================="

          # Initial check (informational; lock may be ahead of manifests)
          Write-Host "deps check (initial)..."
          & $diffusion deps check
          Write-Host "Initial check exit code: $LASTEXITCODE (non-zero is OK here)"

          # Regenerate lock file from manifests
          Write-Host "deps lock..."
          & $diffusion deps lock
          if ($LASTEXITCODE -ne 0) { Write-Error "deps lock failed"; exit 1 }

          # Sync lock back to requirements.yml / meta.yml
          Write-Host "deps sync..."
          & $diffusion deps sync
          if ($LASTEXITCODE -ne 0) { Write-Error "deps sync failed"; exit 1 }

          # Final check - must pass without warnings
          Write-Host "deps check (final)..."
          & $diffusion deps check
          if ($LASTEXITCODE -ne 0) { Write-Error "deps check failed after lock+sync"; exit 1 }

          Write-Host "=========================================="
          Write-Host "All deps smoke tests passed on Windows!"
          Write-Host "=========================================="

      - name: Run deps smoke tests (Linux/macOS)
        if: matrix.os != 'windows'
        working-directory: diffusion_tests
        run: |
          set -e
          DIFFUSION="$GITHUB_WORKSPACE/bin/diffusion"

          echo "=========================================="
          echo "Running deps smoke tests on ${{ matrix.os }}..."
          echo "=========================================="

          # Initial check (informational; lock may be ahead of manifests)
          echo "deps check (initial)..."
          $DIFFUSION deps check || true

          # Regenerate lock file from manifests
          echo "deps lock..."
          $DIFFUSION deps lock

          # Sync lock back to requirements.yml / meta.yml
          echo "deps sync..."
          $DIFFUSION deps sync

          # Final check - must pass without warnings
          echo "deps check (final)..."
          $DIFFUSION deps check

          echo "=========================================="
          echo "All deps smoke tests passed on ${{ matrix.os }}!"
          echo "=========================================="

      - name: Run molecule smoke tests (Windows)
        if: matrix.os == 'windows'
        working-directory: diffusion_tests
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $diffusion = "$env:GITHUB_WORKSPACE\bin\diffusion.exe"

          Write-Host "=========================================="
          Write-Host "Running molecule smoke tests on Windows..."
          Write-Host "=========================================="

          Write-Host "molecule (full test cycle)..."
          & $diffusion molecule --ci
          if ($LASTEXITCODE -ne 0) { Write-Error "molecule failed"; exit 1 }

          Write-Host "molecule --verify..."
          & $diffusion molecule --verify --ci
          if ($LASTEXITCODE -ne 0) { Write-Error "molecule --verify failed"; exit 1 }

          Write-Host "molecule --idempotence..."
          & $diffusion molecule --idempotence --ci
          if ($LASTEXITCODE -ne 0) { Write-Error "molecule --idempotence failed"; exit 1 }

          Write-Host "molecule --lint..."
          & $diffusion molecule --lint --ci
          if ($LASTEXITCODE -ne 0) { Write-Error "molecule --lint failed"; exit 1 }

          Write-Host "molecule --verify --tag ports..."
          & $diffusion molecule --verify --tag ports --ci
          if ($LASTEXITCODE -ne 0) { Write-Error "molecule --verify --tag ports failed"; exit 1 }

          Write-Host "=========================================="
          Write-Host "All molecule smoke tests passed on Windows!"
          Write-Host "=========================================="

      - name: Run molecule smoke tests (Linux/macOS)
        if: matrix.os != 'windows'
        working-directory: diffusion_tests
        run: |
          set -e
          DIFFUSION="$GITHUB_WORKSPACE/bin/diffusion"

          echo "=========================================="
          echo "Running molecule smoke tests on ${{ matrix.os }}..."
          echo "=========================================="

          echo "molecule (full test cycle)..."
          $DIFFUSION molecule --ci
          echo "molecule --verify..."
          $DIFFUSION molecule --verify --ci
          echo "molecule --idempotence..."
          $DIFFUSION molecule --idempotence --ci
          echo "molecule --lint..."
          $DIFFUSION molecule --lint --ci
          echo "molecule --verify --tag ports..."
          $DIFFUSION molecule --verify --tag ports --ci

          echo "=========================================="
          echo "All molecule smoke tests passed on ${{ matrix.os }}!"
          echo "=========================================="

      - name: Run cache and artifact smoke tests (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $diffusion = ".\bin\diffusion.exe"

          Write-Host "=========================================="
          Write-Host "Running cache/artifact smoke tests on Windows..."
          Write-Host "=========================================="

          Write-Host "cache enable..."
          & $diffusion cache enable
          if ($LASTEXITCODE -ne 0) { Write-Error "cache enable failed"; exit 1 }

          Write-Host "cache status..."
          & $diffusion cache status
          if ($LASTEXITCODE -ne 0) { Write-Error "cache status failed"; exit 1 }

          Write-Host "artifact list..."
          & $diffusion artifact list
          if ($LASTEXITCODE -ne 0) { Write-Error "artifact list failed"; exit 1 }

          Write-Host "=========================================="
          Write-Host "All cache/artifact smoke tests passed on Windows!"
          Write-Host "=========================================="

      - name: Run cache and artifact smoke tests (Linux/macOS)
        if: matrix.os != 'windows'
        run: |
          set -e
          DIFFUSION="./bin/diffusion"

          echo "=========================================="
          echo "Running cache/artifact smoke tests on ${{ matrix.os }}..."
          echo "=========================================="

          echo "cache enable..."
          $DIFFUSION cache enable
          echo "cache status..."
          $DIFFUSION cache status
          echo "artifact list..."
          $DIFFUSION artifact list

          echo "=========================================="
          echo "All cache/artifact smoke tests passed on ${{ matrix.os }}!"
          echo "=========================================="

