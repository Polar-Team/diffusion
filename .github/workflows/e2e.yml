name: E2E Tests

on:
  pull_request:
  workflow_dispatch:

jobs:
  e2e:
    name: E2E Tests (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    permissions:
      contents: read
      id-token: write  # Required for OIDC token exchange with AWS, GCP, and Yandex Cloud
    # OIDC secret references evaluated at step level; empty string → step is skipped.
    env:
      AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION || 'us-east-1' }}
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      YC_SA_ID: ${{ secrets.YC_SA_ID }}
      YC_CLOUD_ID: ${{ secrets.YC_CLOUD_ID }}
      YC_FOLDER_ID: ${{ secrets.YC_FOLDER_ID }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux distros – run on ubuntu-latest; smoke tests execute inside
          # a Docker container of the target distro via docker run
          - os: ubuntu2304
            runner: ubuntu-latest
            container: ubuntu:23.04
          - os: ubuntu2404
            runner: ubuntu-latest
            container: ubuntu:24.04
          - os: debian12
            runner: ubuntu-latest
            container: debian:12
          - os: debian13
            runner: ubuntu-latest
            container: debian:trixie
          - os: fedora43
            runner: ubuntu-latest
            container: fedora:43
          - os: fedora42
            runner: ubuntu-latest
            container: fedora:42
          - os: almalinux9
            runner: ubuntu-latest
            container: almalinux:9
          - os: almalinux10
            runner: ubuntu-latest
            container: almalinux:10
          - os: archlinux
            runner: ubuntu-latest
            container: archlinux:latest
          # Native runners
          - os: windows
            runner: windows-latest
          - os: macos
            runner: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Cloud CLI authentication (OIDC) ──────────────────────────────────
      # OIDC eliminates long-lived static credentials. GitHub's identity
      # provider token is exchanged for short-lived cloud tokens at runtime.
      # Required GitHub secrets:
      #   AWS:  AWS_ROLE_ARN, AWS_DEFAULT_REGION
      #   GCP:  GCP_WORKLOAD_IDENTITY_PROVIDER, GCP_SERVICE_ACCOUNT
      #   YC:   YC_SA_ID
      # Each step is skipped when its secret is absent (forks / unconfigured).

      - name: Configure AWS credentials (OIDC)
        if: env.AWS_ROLE_ARN != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Set up gcloud CLI (Windows / macOS)
        if: (env.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && env.GCP_SERVICE_ACCOUNT != '') && runner.os != 'Linux'
        uses: google-github-actions/setup-gcloud@v2

      - name: Authenticate to Google Cloud (OIDC)
        id: gcp-auth
        if: env.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && env.GCP_SERVICE_ACCOUNT != ''
        uses: google-github-actions/auth@v2.0.0
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      # - name: Authenticate to Yandex Cloud (OIDC)
        # id: yc-iam
        # # if: env.YC_SA_ID != ''
        # # uses: docker://ghcr.io/yc-actions/yc-iam-token-fed:1.0.0
        # # with:
        #   yc-sa-id: ${{ secrets.YC_SA_ID }}

      # - name: Export Yandex Cloud IAM token (Linux / macOS)
        # if: steps.yc-iam.outputs.token != '' && runner.os != 'Windows'
        # run: echo "YC_IAM_TOKEN=${{ steps.yc-iam.outputs.token }}" >> "$GITHUB_ENV"

      # - name: Export Yandex Cloud IAM token (Windows)
      #   if: steps.yc-iam.outputs.token != '' && runner.os == 'Windows'
        # shell: pwsh
        # run: '"YC_IAM_TOKEN=${{ steps.yc-iam.outputs.token }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Build diffusion
        run: make build

      - name: Run unit tests
        run: go test -v ./...

      # ── Docker setup ─────────────────────────────────────────────────────

      - name: Start Docker (Linux)
        if: matrix.runner == 'ubuntu-latest'
        run: |
          sudo systemctl start docker
          docker version
          docker info

      - name: Start Docker (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $svc = Get-Service -Name docker -ErrorAction SilentlyContinue
          if ($svc -and $svc.Status -ne 'Running') {
            Start-Service docker
            Start-Sleep -Seconds 10
          }
          docker version
          docker info

      - name: Install and start Docker (macOS)
        if: matrix.os == 'macos'
        uses: docker/setup-docker-action@v4
        with:
          daemon-config: |
            {
              "features": {
                "containerd-snapshotter": true
              }
            }

      # ── Smoke tests ───────────────────────────────────────────────────────

      - name: Run smoke tests (Linux)
        if: matrix.runner == 'ubuntu-latest'
        # Run the diffusion binary (static Go binary) inside the target distro's
        # container. The workspace is mounted at the same host path so that any
        # Docker volume mounts created by molecule resolve correctly on the host
        # Docker daemon (which owns the mounted socket).
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:$GITHUB_WORKSPACE" \
            -v /var/run/docker.sock:/var/run/docker.sock \
            ${GOOGLE_APPLICATION_CREDENTIALS:+-v "$GOOGLE_APPLICATION_CREDENTIALS:$GOOGLE_APPLICATION_CREDENTIALS"} \
            -e WORKSPACE="$GITHUB_WORKSPACE" \
            -e AWS_ACCESS_KEY_ID \
            -e AWS_SECRET_ACCESS_KEY \
            -e AWS_SESSION_TOKEN \
            -e AWS_DEFAULT_REGION \
            ${GOOGLE_APPLICATION_CREDENTIALS:+-e GOOGLE_APPLICATION_CREDENTIALS} \
            ${YC_IAM_TOKEN:+-e YC_IAM_TOKEN} \
            "${{ matrix.container }}" \
            sh -c '
              set -e

              DIFFUSION="${WORKSPACE}/bin/diffusion"

              git clone https://github.com/Polar-Team/diffusion-ansible-tests-role.git /tmp/diffusion_tests && \
              cd /tmp/diffusion_tests

              # Install git (required by diffusion --ci mode to get git remote URL).
              # Each minimal distro image uses a different package manager.
              if command -v apt-get >/dev/null 2>&1; then
                DEBIAN_FRONTEND=noninteractive apt-get update -qq && apt-get install -y -qq git
              elif command -v dnf >/dev/null 2>&1; then
                dnf install -y -q git
              elif command -v pacman >/dev/null 2>&1; then
                pacman -Sy --noconfirm git
              fi

              echo "=========================================="
              echo "Running deps smoke tests on ${{ matrix.os }}..."
              echo "=========================================="
              $DIFFUSION deps check || true
              $DIFFUSION deps lock
              $DIFFUSION deps sync
              $DIFFUSION deps check

              echo "=========================================="
              echo "Running molecule smoke tests on ${{ matrix.os }}..."
              echo "=========================================="
              $DIFFUSION molecule --ci
              $DIFFUSION molecule --verify --ci
              $DIFFUSION molecule --idempotence --ci
              $DIFFUSION molecule --lint --ci
              $DIFFUSION molecule --verify --tag ports --ci

              echo "=========================================="
              echo "Running cache/artifact smoke tests on ${{ matrix.os }}..."
              echo "=========================================="
              cd "$WORKSPACE"
              $DIFFUSION cache enable
              $DIFFUSION cache status
              $DIFFUSION artifact list

              echo "=========================================="
              echo "All smoke tests passed on ${{ matrix.os }}!"
              echo "=========================================="
            '

      - name: Run smoke tests (macOS)
        if: matrix.os == 'macos'
        working-directory: diffusion_tests
        run: |
          set -e
          DIFFUSION="$GITHUB_WORKSPACE/bin/diffusion"

          echo "=========================================="
          echo "Running deps smoke tests on macOS..."
          echo "=========================================="
          $DIFFUSION deps check || true
          $DIFFUSION deps lock
          $DIFFUSION deps sync
          $DIFFUSION deps check

          echo "=========================================="
          echo "Running molecule smoke tests on macOS..."
          echo "=========================================="
          $DIFFUSION molecule --ci
          $DIFFUSION molecule --verify --ci
          $DIFFUSION molecule --idempotence --ci
          $DIFFUSION molecule --lint --ci
          $DIFFUSION molecule --verify --tag ports --ci

          echo "=========================================="
          echo "Running cache/artifact smoke tests on macOS..."
          echo "=========================================="
          cd "$GITHUB_WORKSPACE"
          $DIFFUSION cache enable
          $DIFFUSION cache status
          $DIFFUSION artifact list

          echo "=========================================="
          echo "All smoke tests passed on macOS!"
          echo "=========================================="

      - name: Run smoke tests (Windows)
        if: matrix.os == 'windows'
        working-directory: diffusion_tests
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $diffusion = "$env:GITHUB_WORKSPACE\bin\diffusion.exe"

          Write-Host "=========================================="
          Write-Host "Running deps smoke tests on Windows..."
          Write-Host "=========================================="
          & $diffusion deps check
          Write-Host "Initial check exit code: $LASTEXITCODE (non-zero is OK here)"
          & $diffusion deps lock
          if ($LASTEXITCODE -ne 0) { Write-Error "deps lock failed"; exit 1 }
          & $diffusion deps sync
          if ($LASTEXITCODE -ne 0) { Write-Error "deps sync failed"; exit 1 }
          & $diffusion deps check
          if ($LASTEXITCODE -ne 0) { Write-Error "deps check failed after lock+sync"; exit 1 }

          Write-Host "=========================================="
          Write-Host "Running molecule smoke tests on Windows..."
          Write-Host "=========================================="
          & $diffusion molecule --ci
          if ($LASTEXITCODE -ne 0) { Write-Error "molecule failed"; exit 1 }
          & $diffusion molecule --verify --ci
          if ($LASTEXITCODE -ne 0) { Write-Error "molecule --verify failed"; exit 1 }
          & $diffusion molecule --idempotence --ci
          if ($LASTEXITCODE -ne 0) { Write-Error "molecule --idempotence failed"; exit 1 }
          & $diffusion molecule --lint --ci
          if ($LASTEXITCODE -ne 0) { Write-Error "molecule --lint failed"; exit 1 }
          & $diffusion molecule --verify --tag ports --ci
          if ($LASTEXITCODE -ne 0) { Write-Error "molecule --verify --tag ports failed"; exit 1 }

          Write-Host "=========================================="
          Write-Host "Running cache/artifact smoke tests on Windows..."
          Write-Host "=========================================="
          $diffusion = "$env:GITHUB_WORKSPACE\bin\diffusion.exe"
          Set-Location "$env:GITHUB_WORKSPACE"
          & $diffusion cache enable
          if ($LASTEXITCODE -ne 0) { Write-Error "cache enable failed"; exit 1 }
          & $diffusion cache status
          if ($LASTEXITCODE -ne 0) { Write-Error "cache status failed"; exit 1 }
          & $diffusion artifact list
          if ($LASTEXITCODE -ne 0) { Write-Error "artifact list failed"; exit 1 }

          Write-Host "=========================================="
          Write-Host "All smoke tests passed on Windows!"
          Write-Host "=========================================="

