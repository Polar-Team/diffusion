---
# Example: Diffusion Dependency Update with Caching
# Uses caching to speed up the test phase after sync.

name: Dependency Update (Cached)

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: Update Dependencies (cached)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Diffusion Update
        uses: Polar-Team/diffusion/diffusion-update@main
        with:
          diffusion-version: "latest"
          target-branch: "main"
          cache-enabled: "true"
          cache-uv: "true"
          cache-docker: "true"
          run-lint: "true"
          run-verify: "true"
          run-idempotence: "true"
